version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cinebot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cinebot:cinebot_secret@postgres:5432/cinebot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cinebot_net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  postgres:
    image: postgres:16-alpine
    container_name: cinebot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cinebot
      POSTGRES_USER: cinebot
      POSTGRES_PASSWORD: cinebot_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinebot -d cinebot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cinebot_net

  redis:
    image: redis:7-alpine
    container_name: cinebot_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cinebot_net

volumes:
  pgdata:
  redisdata:

networks:
  cinebot_net:
    driver: bridge